<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Rotina</title>
</head>
<body>
    <h1>Editar Rotina</h1>
    
    <form method="POST">
        
        <div>
            <label for="name">Nome da Rotina:</label><br>
            <input type="text" id="name" name="name" maxlength="60" value="{{ task.name }}" required>
        </div>
        <br>
        
        <div>
            <label for="description">Descrição:</label><br>
            <textarea id="description" name="description" maxlength="255" rows="3" cols="30">{{ task.description or '' }}</textarea>
        </div>
        <br>
        
        <div>
            <label for="deadLine">Prazo Final:</label><br>
            <input type="datetime-local" id="deadLine" name="deadLine" 
                   value="{{ task.deadLine.strftime('%Y-%m-%dT%H:%M') if task.deadLine else '' }}">
        </div>
        <br>
        
        <button type="submit">Salvar Alterações</button>
        <a href="{{ url_for('user.dashboard') }}">Cancelar</a>
        
    </form>
</body>
</html>
